name: ${COMPOSE_PROJECT_NAME:-postgres}

services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-18-alpine}
    container_name: ${CONTAINER_NAME:-postgres}
    hostname: ${CONTAINER_NAME:-postgres}
    restart: ${RESTART_POLICY:-unless-stopped}
    stop_grace_period: ${STOP_GRACE_PERIOD:-1m}
    shm_size: ${SHM_SIZE:-256mb}

    ports:
      - "${POSTGRES_BIND_HOST:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS:-}
      TZ: ${TZ:-UTC}
      PGTZ: ${TZ:-UTC}

    volumes:
      - postgres_data:${POSTGRES_DATA_TARGET:-/var/lib/postgresql}
      - ${POSTGRES_LOGS_DIR:-./logs}:/var/log/postgresql
      - ${POSTGRES_CONFIG_FILE:-./custom.conf}:/etc/postgresql/postgresql.conf:ro

    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - logging_collector=on
      - -c
      - log_directory=/var/log/postgresql
      - -c
      - log_filename=postgresql-%Y-%m-%d.log
      - -c
      - log_rotation_age=1d
      - -c
      - log_rotation_size=0

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - postgres_net

networks:
  postgres_net:
    name: ${POSTGRES_NETWORK:-postgres_net}
    external: true

volumes:
  postgres_data:
    name: ${POSTGRES_DATA_VOLUME:-postgres_data}
    external: true
