services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-18-alpine}
    container_name: postgres
    hostname: postgres
    restart: unless-stopped
    stop_grace_period: ${STOP_GRACE_PERIOD:-1m}
    shm_size: ${SHM_SIZE:-256mb}

    ports:
      - "${POSTGRES_BIND_HOST:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS:-}
      TZ: ${TZ:-UTC}
      PGTZ: ${TZ:-UTC}

    volumes:
      - postgres_data:/var/lib/postgresql
      - ${POSTGRES_LOGS_DIR:-./logs}:/var/log/postgresql

    command: postgres ${POSTGRES_COMMAND:-}

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - postgres_net

networks:
  postgres_net:
    name: ${POSTGRES_NETWORK:-postgres_net}
    external: true

volumes:
  postgres_data:
    name: ${POSTGRES_DATA_VOLUME:-postgres_data}
    external: true
